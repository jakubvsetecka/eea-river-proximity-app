<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EEA River Proximity Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; }
    #map { height: 100vh; }
    #status {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: white; padding: 8px 18px; border-radius: 20px;
      border: 1px solid #ddd; z-index: 1000; font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); white-space: nowrap;
      pointer-events: none;
    }
    #legend {
      position: fixed; bottom: 30px; left: 10px;
      background: white; padding: 12px 15px; border-radius: 8px;
      border: 1px solid #ddd; z-index: 1000; font-size: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); line-height: 2;
    }
    #legend strong { display: block; margin-bottom: 2px; font-size: 13px; }
    .leaflet-popup-content { font-size: 13px; line-height: 1.5; }
    .leaflet-popup-content hr { margin: 6px 0; border: none; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status">Initializing...</div>
  <div id="legend">
    <strong>River Split</strong>
    <span style="color:#2ca02c">━━</span> Upstream<br>
    <span style="color:#d62728">━━</span> Downstream<br>
    <small style="color:#888; line-height:1.4; display:block; margin-top:4px">
      Click a facility<br>to see its river split
    </small>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm/+esm';

    const HF_FACILITIES = 'https://huggingface.co/datasets/cassini-team-todo/eea-river-proximity/resolve/main/river_data_facilities.geoparquet';

    const SECTOR_COLORS = {
      1: '#e41a1c', 2: '#377eb8', 3: '#4daf4a', 4: '#984ea3',
      5: '#ff7f00', 6: '#a65628', 7: '#f781bf', 8: '#999999', 9: '#66c2a5',
    };

    const statusEl = document.getElementById('status');
    const setStatus = msg => { statusEl.textContent = msg; };

    // Map
    const map = L.map('map').setView([51, 10], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> &copy; <a href="https://carto.com">CARTO</a>',
      maxZoom: 19
    }).addTo(map);

    let riverLayers = [];
    const clearRivers = () => { riverLayers.forEach(l => map.removeLayer(l)); riverLayers = []; };
    const addGeoJSON = (str, style) => {
      if (!str) return;
      try {
        const layer = L.geoJSON(JSON.parse(str), { style: () => style }).addTo(map);
        riverLayers.push(layer);
      } catch (e) { console.warn('GeoJSON parse error', e); }
    };

    // DuckDB WASM
    setStatus('Loading DuckDB WASM...');
    const bundles = duckdb.getJsDelivrBundles();
    const bundle = await duckdb.selectBundle(bundles);
    const workerUrl = URL.createObjectURL(
      new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
    );
    const worker = new Worker(workerUrl);
    const db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(), worker);
    await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
    URL.revokeObjectURL(workerUrl);

    const conn = await db.connect();

    setStatus('Installing spatial extension...');
    await conn.query('INSTALL spatial; LOAD spatial;');

    // Create view — DuckDB fetches and caches the parquet lazily
    await conn.query(`CREATE VIEW facilities AS SELECT * FROM read_parquet('${HF_FACILITIES}')`);

    setStatus('Fetching facilities from HuggingFace...');

    // With spatial extension, geoparquet geometry column is auto-typed as GEOMETRY
    const result = await conn.query(`
      SELECT
        facilityName, city, countryName,
        EPRTR_SectorCode, EPRTR_SectorName,
        n_upstream, n_downstream,
        closest_river_id, distance_to_river_m,
        river_strahler, river_discharge,
        ST_X(geometry) AS lon,
        ST_Y(geometry) AS lat
      FROM facilities
      WHERE geometry IS NOT NULL
    `);

    const rows = result.toArray().map(r => r.toJSON());
    setStatus(`Rendering ${rows.length.toLocaleString()} facilities...`);

    for (const row of rows) {
      if (row.lat == null || row.lon == null) continue;

      const color = SECTOR_COLORS[row.EPRTR_SectorCode] ?? '#999';
      const marker = L.circleMarker([row.lat, row.lon], {
        radius: 5, color, fillColor: color, fillOpacity: 0.7, weight: 1
      }).addTo(map);

      marker.bindPopup(`
        <strong>${row.facilityName ?? '—'}</strong><br>
        ${[row.city, row.countryName].filter(Boolean).join(', ')}<br>
        <em style="color:#555">${row.EPRTR_SectorName ?? ''}</em>
        <hr>
        <small>
          River <strong>${row.closest_river_id}</strong>
          &nbsp;(${Math.round(row.distance_to_river_m ?? 0)} m)<br>
          Strahler ${row.river_strahler ?? '—'}
          &nbsp;|&nbsp; ${(row.river_discharge ?? 0).toFixed(1)} m³/s<br>
          <span style="color:#2ca02c">↑ ${row.n_upstream} upstream</span>
          &nbsp;
          <span style="color:#d62728">↓ ${row.n_downstream} downstream</span>
        </small>
      `);

      marker.on('click', async () => {
        clearRivers();
        setStatus('Loading river geometry...');

        const name = (row.facilityName ?? '').replace(/'/g, "''");
        const rivers = await conn.query(`
          SELECT
            ST_AsGeoJSON(ST_GeomFromWKB(upstream_poly_wkb))   AS up_poly,
            ST_AsGeoJSON(ST_GeomFromWKB(downstream_poly_wkb)) AS down_poly,
            ST_AsGeoJSON(ST_GeomFromWKB(upstream_line_wkb))   AS up_line,
            ST_AsGeoJSON(ST_GeomFromWKB(downstream_line_wkb)) AS down_line
          FROM facilities
          WHERE facilityName = '${name}'
          LIMIT 1
        `);

        const [r] = rivers.toArray().map(x => x.toJSON());
        if (r) {
          addGeoJSON(r.up_poly,   { color: '#2ca02c', weight: 1, fillColor: '#98df8a', fillOpacity: 0.4 });
          addGeoJSON(r.down_poly, { color: '#d62728', weight: 1, fillColor: '#ff9896', fillOpacity: 0.4 });
          addGeoJSON(r.up_line,   { color: '#2ca02c', weight: 2 });
          addGeoJSON(r.down_line, { color: '#d62728', weight: 2 });
        }

        setStatus(`Ready — ${rows.length.toLocaleString()} facilities loaded`);
      });
    }

    setStatus(`Ready — ${rows.length.toLocaleString()} facilities loaded`);
  </script>
</body>
</html>
